services:
  - type: web
    name: ai-support-ticket-chatbot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: AI Support Ticket Chatbot
      - key: APP_VERSION
        value: 0.1.0
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: ai-support-ticket-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: AUTH_BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: API_KEY_REQUIRED
        value: false
      - key: TRUST_X_FORWARDED_FOR
        value: true
      - key: DEMO_ENDPOINT_ENABLED
        value: false

databases:
  - name: ai-support-ticket-db
    databaseName: support_tickets
    user: support_user
