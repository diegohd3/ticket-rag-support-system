version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-support-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_tickets"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
